<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kankotri Master Pro | Gujarati PDF Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --nav-bg: #1e293b;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
            --danger: #ef4444;
            --success: #10b981;
            --overlay: rgba(0, 0, 0, 0.8);
        }

        [data-theme="light"] {
            --nav-bg: #ffffff;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body { font-family: 'Inter', 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; transition: 0.3s; overflow-x: hidden; }

        nav { background-color: var(--nav-bg); border-bottom: 1px solid var(--border); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 900; }
        
        .sidebar-overlay { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: var(--overlay); z-index: 1000; transition: 0.3s; display: flex; justify-content: flex-end; backdrop-filter: blur(4px); }
        .sidebar-overlay.active { right: 0; }
        .nav-menu { width: 300px; height: 100vh; background: var(--nav-bg); padding: 25px; display: flex; flex-direction: column; overflow-y: auto; box-sizing: border-box; }
        .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }

        .menu-btn { padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; transition: 0.2s; width: 100%; font-size: 1rem; text-align: left; }
        .menu-btn:hover { border-color: var(--primary); background: var(--primary); color: white; }
        
        .btn-clear-all { color: var(--danger); border-color: var(--danger); margin-top: auto; font-weight: bold; }

        .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        .stat-card span { display: block; font-size: 2rem; font-weight: 800; color: var(--primary); }

        .add-data-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 12px; }
        .add-data-box input { flex: 1; min-width: 200px; padding: 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); outline: none; }
        
        .village-summary { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .village-tag { background: var(--card); border: 1px solid var(--border); padding: 8px 15px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; transition: 0.2s; }
        .village-tag.active { background: var(--primary); color: white; border-color: var(--primary); }

        .table-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .search-bar { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); outline: none; }
        
        select { padding: 10px; border-radius: 10px; background: var(--card); color: var(--text); border: 1px solid var(--border); outline: none; }

        .table-wrapper { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th { text-align: left; padding: 15px; background: rgba(255,255,255,0.03); border-bottom: 2px solid var(--border); color: var(--primary); }
        td { padding: 15px; border-bottom: 1px solid var(--border); }

        .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
        .page-item { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; }
        .page-item.active { background: var(--primary); color: white; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; }

        /* PDF Layout (Hidden) */
        #pdf-content { display: none; padding: 30px; background: white; color: black; font-family: 'Arial Unicode MS', sans-serif; }
        .pdf-header { text-align: center; color: #6366f1; margin-bottom: 20px; border-bottom: 2px solid #6366f1; padding-bottom: 10px; }
        .pdf-table { width: 100%; border-collapse: collapse; }
        .pdf-table th, .pdf-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .pdf-table th { background-color: #f1f1f1; }
    </style>
</head>
<body data-theme="dark">

<nav>
    <div style="font-weight: 800; font-size: 1.4rem; color: var(--primary);"><i class="fas fa-heart"></i> કંકોત્રી શગુન પેજ</div>
    <div onclick="toggleSidebar()" style="cursor:pointer; font-size:1.6rem;"><i class="fas fa-bars"></i></div>
</nav>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()">
    <div class="nav-menu" onclick="event.stopPropagation()">
        <div class="menu-header">
            <h2 style="margin:0">Menu</h2>
            <i class="fas fa-times" style="cursor:pointer;" onclick="toggleSidebar()"></i>
        </div>
        <button class="menu-btn" onclick="downloadGujaratiPDF()"><i class="fas fa-file-pdf"></i> Download Gujarati PDF</button>
        <button class="menu-btn" onclick="exportData()"><i class="fas fa-download"></i> Export JSON</button>
        <label class="menu-btn" style="cursor:pointer">
            <i class="fas fa-upload"></i> Import JSON
            <input type="file" hidden onchange="importData(event)">
        </label>
        <button class="menu-btn" onclick="toggleTheme()"><i class="fas fa-circle-half-stroke"></i> Dark/Light Mode</button>
        <button class="menu-btn btn-clear-all" onclick="clearAll()"><i class="fas fa-trash-can"></i> CLEAR ALL DATA</button>
    </div>
</div>

<div class="container">
    <div class="dashboard">
        <div class="stat-card">Total Records<span id="statTotal">0</span></div>
        <div class="stat-card">Villages<span id="statVills">0</span></div>
    </div>

    <div class="add-data-box">
        <input type="text" id="nameIn" placeholder="Full Name (Gujarati/Hindi/English)">
        <input type="text" id="villageIn" placeholder="Village Name">
        <button class="menu-btn" style="background:var(--primary); color:white; border:none; width:auto; margin:0;" onclick="addEntry()">Add Data</button>
    </div>

    <div class="village-summary" id="villageSummary"></div>

    <div class="table-tools">
        <input type="text" id="searchIn" class="search-bar" placeholder="🔍 Search records..." onkeyup="resetAndRender()">
        <select id="dateOrder" onchange="resetAndRender()">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
        </select>
        <select id="pageLimit" onchange="resetAndRender()">
            <option value="10">Show 10</option>
            <option value="50">Show 50</option>
            <option value="100">Show 100</option>
        </select>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th width="60">Sr.</th>
                    <th>Full Name</th>
                    <th>Village</th>
                    <th width="120">Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="pagination" id="paginationControls"></div>
</div>

<div id="pdf-content">
    <div class="pdf-header">
        <h1>કંકોત્રી આમંત્રણ યાદી (ગામ મુજબ)</h1>
        <p>Sorted by Village - Generated on: <span id="pdfDate"></span></p>
    </div>
    <table class="pdf-table">
        <thead>
            <tr>
                <th width="60">ક્રમ</th>
                <th>નામ</th>
                <th>ગામ</th>
            </tr>
        </thead>
        <tbody id="pdfTableBody"></tbody>
    </table>
</div>

<div class="overlay" id="editModal">
    <div class="modal">
        <h3>Edit Record</h3>
        <input type="hidden" id="editId">
        <input type="text" id="editName" style="width:100%; padding:12px; margin-bottom:12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text);">
        <input type="text" id="editVillage" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text);">
        <div style="display:flex; gap:10px;">
            <button class="menu-btn" style="flex:1; background:var(--primary); color:white;" onclick="saveEdit()">Update</button>
            <button class="menu-btn" style="flex:1;" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('kankotri_final_v6')) || [];
    let currentFilter = null;
    let currentPage = 1;

    function toggleSidebar() { document.getElementById('sidebarOverlay').classList.toggle('active'); }
    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); }

    function addEntry() {
        const n = document.getElementById('nameIn'), v = document.getElementById('villageIn');
        if(!n.value || !v.value) return;
        db.push({ id: Date.now(), name: n.value.trim(), village: v.value.trim() });
        n.value = ''; v.value = ''; save();
    }

    function save() { localStorage.setItem('kankotri_final_v6', JSON.stringify(db)); render(); }
    function resetAndRender() { currentPage = 1; render(); }

    function render() {
        const query = document.getElementById('searchIn').value.toLowerCase();
        const limit = parseInt(document.getElementById('pageLimit').value);
        const order = document.getElementById('dateOrder').value;
        const tbody = document.getElementById('tableBody');
        const summary = document.getElementById('villageSummary');
        const pagin = document.getElementById('paginationControls');
        
        tbody.innerHTML = ''; summary.innerHTML = ''; pagin.innerHTML = '';

        const vCounts = {};
        db.forEach(e => vCounts[e.village] = (vCounts[e.village] || 0) + 1);
        document.getElementById('statTotal').innerText = db.length;
        document.getElementById('statVills').innerText = Object.keys(vCounts).length;

        Object.keys(vCounts).sort().forEach(v => {
            const activeClass = currentFilter === v ? 'active' : '';
            summary.innerHTML += `<div class="village-tag ${activeClass}" onclick="toggleFilter('${v}')">${v} (${vCounts[v]}) ${currentFilter === v ? '<i class="fas fa-times-circle" onclick="clearFilter(event)"></i>' : ''}</div>`;
        });

        let filtered = [...db];
        if (currentFilter) filtered = filtered.filter(e => e.village === currentFilter);
        if (query) filtered = filtered.filter(e => e.name.toLowerCase().includes(query) || e.village.toLowerCase().includes(query));

        if (order === 'newest') filtered.sort((a, b) => b.id - a.id);
        else filtered.sort((a, b) => a.id - b.id);

        const totalPages = Math.ceil(filtered.length / limit);
        const start = (currentPage - 1) * limit;
        const pageData = filtered.slice(start, start + limit);

        pageData.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${start + index + 1}</td><td><strong>${item.name}</strong></td><td>${item.village}</td>
                <td><button style="color:var(--success); background:none; border:none; cursor:pointer;" onclick="openEdit(${item.id})"><i class="fas fa-edit"></i></button>
                <button style="color:var(--danger); background:none; border:none; cursor:pointer;" onclick="deleteItem(${item.id})"><i class="fas fa-trash"></i></button></td>`;
            tbody.appendChild(tr);
        });

        if(totalPages > 1) {
            pagin.innerHTML += `<button class="page-item" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage-1})">Prev</button>`;
            for(let i=1; i<=totalPages; i++) {
                if(i === 1 || i === totalPages || (i >= currentPage-1 && i <= currentPage+1)) {
                    pagin.innerHTML += `<button class="page-item ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
                }
            }
            pagin.innerHTML += `<button class="page-item" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage+1})">Next</button>`;
        }
    }

    function toggleFilter(v) { currentFilter = v; resetAndRender(); }
    function clearFilter(e) { e.stopPropagation(); currentFilter = null; resetAndRender(); }
    function changePage(p) { currentPage = p; render(); }

    // --- PDF LOGIC: GUJARATI SUPPORT & ASCENDING SORT ---
    function downloadGujaratiPDF() {
        const element = document.getElementById('pdf-content');
        const pdfTableBody = document.getElementById('pdfTableBody');
        document.getElementById('pdfDate').innerText = new Date().toLocaleDateString();

        // 1. Sort by Village Ascending (A to Z)
        const sortedData = [...db].sort((a, b) => a.village.localeCompare(b.village, 'gu'));

        // 2. Fill PDF Table
        pdfTableBody.innerHTML = '';
        sortedData.forEach((item, index) => {
            pdfTableBody.innerHTML += `<tr>
                <td>${index + 1}</td>
                <td>${item.name}</td>
                <td>${item.village}</td>
            </tr>`;
        });

        element.style.display = 'block'; // Temporarily show

        const opt = {
            margin:       10,
            filename:     'Kankotri_Report_Gujarati.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, logging: false },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            element.style.display = 'none'; // Hide back
            toggleSidebar();
        });
    }

    function openEdit(id) {
        const item = db.find(e => e.id === id);
        document.getElementById('editId').value = item.id;
        document.getElementById('editName').value = item.name;
        document.getElementById('editVillage').value = item.village;
        document.getElementById('editModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('editModal').style.display = 'none'; }
    function saveEdit() {
        const id = parseInt(document.getElementById('editId').value);
        db = db.map(e => e.id === id ? { ...e, name: document.getElementById('editName').value, village: document.getElementById('editVillage').value } : e);
        save(); closeModal();
    }
    function deleteItem(id) { if(confirm("Delete record?")) { db = db.filter(e => e.id !== id); save(); } }
    function clearAll() { if(confirm("Wipe ALL data? This cannot be undone.")) { db = []; save(); toggleSidebar(); } }
    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click();
    }
    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { 
            try {
                db = JSON.parse(ev.target.result); 
                save(); 
                alert("Import successful!");
            } catch(e) { alert("Error: Invalid JSON file."); }
        };
        reader.readAsText(e.target.files[0]);
    }

    render();
</script>
</body>
</html>
